<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — The Wrexham Story</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0D0D0D;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .error { max-width: 480px; }
    .error__code {
      font-size: clamp(80px, 15vw, 120px);
      font-weight: 800;
      color: #E4003B;
      line-height: 1;
      margin-bottom: 16px;
    }
    .error__title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .error__text {
      font-size: 16px;
      color: #A0A0A0;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .error__link {
      display: inline-block;
      font-size: 14px;
      font-weight: 600;
      color: #A0A0A0;
      text-decoration: none;
      border: 1px solid #2A2A2A;
      padding: 12px 28px;
      border-radius: 100px;
      transition: color 0.2s, border-color 0.2s;
    }
    .error__link:hover {
      color: #FFFFFF;
      border-color: #A0A0A0;
    }
  </style>
</head>
<body>
  <div class="error">
    <div class="error__code">404</div>
    <h1 class="error__title">Page Not Found</h1>
    <p class="error__text">This page doesn't exist — but Wrexham's rise certainly does.</p>
    <a href="/" class="error__link">&larr; Back to The Wrexham Story</a>
  </div>
</body>
</html>
